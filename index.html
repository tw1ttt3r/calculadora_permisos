<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script type="module" src="src/index.mjs" defer></script>
    <link rel="stylesheet" href="src/styles/styles.css" />
    <link rel="icon" href="/public/favicon.ico">
  </head>
  <body>
    <main class="root">
      <section class="flex flex-col gap-3 min-w-4/6">
        <section class="message">
          <span class="font-sometype text-sm">Existen 3 tipos de permisos:</span>
          <ul class="*:font-roboto *:text-2xs">
            <li>
              <span>Lectura</span>
              <span>(r)</span>
              <span></span>
            </li>
            <li>
              <span>Escritura</span>
              <span>(w)</span>
              <span></span>
            </li>
            <li>
              <span>Ejecución</span>
              <span>(x)</span>
              <span></span>
            </li>
            <li>
              <span>Sin permiso</span>
              <span>(-)</span>
              <span></span>
            </li>
          </ul>
        </section>
        <div class="flex gap-1 *:border-t-0 *:border-b-0 *:select-none">
          <p class="border-x px-1 tab tab-enabled">Selección</p>
          <p class="border-x px-1 tab tab-disabled">Avanzado</p>
        </div>
        <section class="container-calculator calculator">
          <div class="calculator-control">
            <div class="flex flex-col">
              <span>Tipo</span>
              <select id="controls-tipos" class="permisos-control-tipos"></select>
            </div>
            <div class="flex items-center">
              <span class="controls-tipos-description"></span>
            </div>
          </div>
          <div class="calculator-control">
            <div class="flex flex-col">
              <span>Usuario</span>
              <select id="controls-user" class="permisos-control"></select>
            </div>
            <div class="flex items-center">
              <span class="controls-user-description"></span>
            </div>
          </div>
          <div class="calculator-control">
            <div class="flex flex-col">
              <span>Grupo</span>
              <select id="controls-group" class="permisos-control"></select>
            </div>
            <div class="flex items-center">
              <span class="controls-group-description"></span>
            </div>
          </div>
          <div class="calculator-control">
            <div class="flex flex-col">
              <span>Otros</span>
              <select id="controls-others" class="permisos-control"></select>
            </div>
            <div class="flex items-center">
              <span class="controls-others-description"></span>
            </div>
          </div>
        </section>
        <section class="container-calculator advanced"></section>
      </section>
    </main>
  </body>
</html>
