<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script type="module" src="src/index.mjs" defer></script>
    <link rel="stylesheet" href="src/styles/styles.css" />
  </head>
  <body>
    <main class="root">
      <section class="flex flex-col gap-3 min-w-4/6">
        <section class="message">
          <span class="font-sometype text-sm">Existen 3 tipos de permisos:</span>
          <ul class="*:font-roboto *:text-2xs">
            <li>
              <span>Lectura</span>
              <span>(r)</span>
              <span></span>
            </li>
            <li>
              <span>Escritura</span>
              <span>(w)</span>
              <span></span>
            </li>
            <li>
              <span>Ejecución</span>
              <span>(x)</span>
              <span></span>
            </li>
          </ul>
        </section>
        <section class="calculator">
          <div class="calculator-control">
            <span>Usuario</span>
            <select id="controls-user" class="permisos-control"></select>
          </div>
          <div class="calculator-control">
            <span>Grupo</span>
            <select id="controls-group" class="permisos-control"></select>
          </div>
          <div class="calculator-control">
            <span>Otros</span>
            <select id="controls-others" class="permisos-control"></select>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
