<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script type="module" src="src/index.mjs" defer></script>
    <link rel="stylesheet" href="src/styles/styles.css" />
    <link rel="icon" href="/public/favicon.ico">
  </head>
  <body>
    <main class="root">
      <section class="flex flex-col gap-3 min-w-4/6">
        <section class="message">
          <span class="font-sometype text-sm">Existen 3 tipos de permisos:</span>
          <ul class="*:font-roboto *:text-2xs">
            <li>
              <span>Lectura</span>
              <span>(r)</span>
              <span></span>
            </li>
            <li>
              <span>Escritura</span>
              <span>(w)</span>
              <span></span>
            </li>
            <li>
              <span>Ejecución</span>
              <span>(x)</span>
              <span></span>
            </li>
            <li>
              <span>Sin permiso</span>
              <span>(-)</span>
              <span></span>
            </li>
          </ul>
        </section>
        <div class="flex gap-1 *:border-t-0 *:border-b-0 *:select-none">
          <p class="border-x px-1 tab tab-enabled">Selección</p>
          <p class="border-x px-1 tab tab-enabled">Avanzado</p>
        </div>
        <section class="container-calculator calculator">
          <form class="form-permisos-selection flex justify-around w-full">
            <div class="calculator-control">
              <div class="flex flex-col">
                <span>Tipo</span>
                <select id="controls-tipos" class="permisos-control-tipos"></select>
              </div>
              <div class="flex items-center">
                <span class="controls-tipos-description controls-msg"></span>
              </div>
            </div>
            <div class="calculator-control">
              <div class="flex flex-col">
                <span>Usuario</span>
                <select id="controls-user" class="permisos-control"></select>
              </div>
              <div class="flex items-center">
                <span class="controls-user-description controls-msg"></span>
              </div>
            </div>
            <div class="calculator-control">
              <div class="flex flex-col">
                <span>Grupo</span>
                <select id="controls-group" class="permisos-control"></select>
              </div>
              <div class="flex items-center">
                <span class="controls-group-description controls-msg"></span>
              </div>
            </div>
            <div class="calculator-control">
              <div class="flex flex-col">
                <span>Otros</span>
                <select id="controls-others" class="permisos-control"></select>
              </div>
              <div class="flex items-center">
                <span class="controls-others-description controls-msg"></span>
              </div>
            </div>
          </form>
        </section>
        <section class="container-calculator advanced flex-col justify-start pt-0.5 pb-0.5 max-h-auto gap-0.5">
          <form class="form-advanced-calculator py-0.5 flex justify-center">
            <input type="text" name="permisos-control-input" maxlength="10" class="advanced-permisos-control border rounded" />
          </form>
          <div class="flex flex-col gap-1 *:font-roboto *:text-2xs items-center">
            <span class="errors-advanced-permiso"></span>
            <span class="meaning-advanced-permiso"></span>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
